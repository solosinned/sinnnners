                contextMenu.classList.remove('show');
                if (activityInterval) clearInterval(activityInterval);
            }

            // ----- enter chat -----
            function enterChat(username) {
                authView.classList.add('hidden');
                chatView.classList.remove('hidden');
                const users = getUsers();
                const user = users.find(u => u.username === username);
                currentView = 'home';
                renderChannelsSidebar();
                setActiveChannel('general');
                renderMessages('general');
                renderMemberList();
                updatePlaceholder();
                updateTypingIndicator();
                updateNotificationBadge(username);

                // Start activity heartbeat
                if (activityInterval) clearInterval(activityInterval);
                activityInterval = setInterval(() => {
                    updatePresence(username);
                    renderMemberList();
                }, 10000);
                ['mousemove', 'keydown', 'click'].forEach(ev => {
                    document.addEventListener(ev, () => updatePresence(username), { passive: true });
                });
            }

            // ----- channel switching -----
            function setActiveChannel(channel) {
                setUserTyping(false);
                currentChannel = channel;
                document.querySelectorAll('.channel-item').forEach(ch => {
                    ch.classList.toggle('active', ch.dataset.channel === channel);
                });
                channelNameSpan.textContent = channel;
                renderMessages(channel);
                updatePlaceholder();
                updateTypingIndicator();
                if (typingTimeout) clearTimeout(typingTimeout);
            }
            function updatePlaceholder() {
                if (currentReplyTo) {
                    messageInput.placeholder = `Replying to ${currentReplyTo.username}...`;
                } else if (currentChannel.startsWith('dm')) {
                    const parts = currentChannel.split('_');
                    const other = parts[1] === getCurrentUser().username ? parts[2] : parts[1];
                    messageInput.placeholder = `Message @${other}`;
                } else {
                    messageInput.placeholder = `Message #${currentChannel}`;
                }
            }

            // ----- send message (with mute check) -----
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text) return;
                const current = getCurrentUser();
                if (!current) return;
                if (getMuted().includes(current.username)) {
                    alert('You are muted and cannot send messages.');
                    return;
                }
                const newMsg = {
                    username: current.username,
                    text: text,
                    channel: currentChannel,
                    timestamp: Date.now(),
                    id: Date.now().toString() + Math.random().toString(36).substring(2)
                };
                if (currentReplyTo) {
                    newMsg.replyTo = currentReplyTo.id;
                    const originalMsg = getMessages().find(m => m.id === currentReplyTo.id);
                    if (originalMsg && originalMsg.username !== current.username) {
                        addNotification(originalMsg.username, { type: 'reply', from: current.username, read: false });
                    }
                    currentReplyTo = null;
                    updatePlaceholder();
                }
                const msgs = getMessages();
                msgs.push(newMsg);
                saveMessages(msgs);
                renderMessages(currentChannel);
                messageInput.value = '';
                setUserTyping(false);
                if (typingTimeout) clearTimeout(typingTimeout);
            }
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Cancel reply when user starts typing different
            messageInput.addEventListener('input', () => {
                if (currentReplyTo && messageInput.value.trim() === '') {
                    currentReplyTo = null;
                    updatePlaceholder();
                }
                const current = getCurrentUser();
                if (!current) return;
                if (messageInput.value.trim() !== '') {
                    setUserTyping(true);
                    if (typingTimeout) clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        setUserTyping(false);
                        typingTimeout = null;
                    }, 2000);
                } else {
                    setUserTyping(false);
                    if (typingTimeout) {
                        clearTimeout(typingTimeout);
                        typingTimeout = null;
                    }
                }
            });

            // ----- session check -----
            const existing = getCurrentUser();
            if (existing) {
                enterChat(existing.username);
            } else {
                authView.classList.remove('hidden');
                chatView.classList.add('hidden');
            }
        })();
    </script>
</body>
</html>
